name: unichat

# ─────────────────────────────────────────────────────────────────────────────
# VPS / public-server compose.
#
# Differs from docker-compose.yml (local dev) in three ways that matter once
# this is on a public IP:
#
#   1. Postgres, Redis and Redpanda publish NO host ports. They are reachable
#      only from inside the compose network. On a public box this is not
#      optional: Docker writes its own iptables rules and BYPASSES ufw, so a
#      published 5432 would sit open to the internet with a known password
#      regardless of the firewall. Only the gateway (80) is public.
#
#   2. A one-shot `db-init` service creates every table and seeds the demo
#      accounts before the app services start, so `docker compose up` yields a
#      working database with no manual prisma step.
#
#   3. JWT_SECRET is read from the environment (set it in a .env beside this
#      file) and only falls back to the committed default if unset.
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:15-alpine
    container_name: unichat-postgres
    environment:
      POSTGRES_USER: unichat_admin
      POSTGRES_PASSWORD: unichat_password
      POSTGRES_DB: unichat_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No `ports:` — internal only. Gates db-init and the app services below.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unichat_admin -d unichat_db"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: unichat-redis
    volumes:
      - redis_data:/data
    # No `ports:` — internal only.

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: unichat-redpanda
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:9092
    # No `ports:` — internal only. External Kafka listener dropped since nothing
    # off-box speaks to it.

  # One-shot: create/patch the schema and seed, then exit. App services wait on
  # it via service_completed_successfully so none of them query an empty DB.
  db-init:
    build:
      context: ./infrastructure/database
    container_name: unichat-db-init
    environment:
      DATABASE_URL: postgresql://unichat_admin:unichat_password@postgres:5432/unichat_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  gateway:
    image: nginx:alpine
    container_name: unichat-gateway
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Flutter web build output. The `web-builder` service below (run on
      # demand, see its comment) writes straight into this same host path,
      # so nginx picks up a new build immediately — no restart needed.
      - ./apps/mobile/build/web:/usr/share/nginx/html:ro
    depends_on:
      - auth-service
      - messaging-service
      - user-service
      - tenant-service
      - presence-service
      - media-service

  auth-service:
    build:
      context: ./services/auth-service
    container_name: unichat-auth-service
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://unichat_admin:unichat_password@postgres:5432/unichat_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-super_secret_unichat_key}
      KAFKA_BROKERS: redpanda:9092
      # SEWMR SMS — set these in a .env beside this file (never committed). When
      # unset, OTPs fall back to the auth-service log.
      SMS_API_TOKEN: ${SMS_API_TOKEN:-}
      SMS_SENDER_ID: ${SMS_SENDER_ID:-}
      SMS_BASE_URL: ${SMS_BASE_URL:-https://api.sewmrsms.co.tz}
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started

  messaging-service:
    build:
      context: ./services/messaging-service
    container_name: unichat-messaging-service
    volumes:
      - ./services/messaging-service/uploads:/app/uploads
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://unichat_admin:unichat_password@postgres:5432/unichat_db
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      redpanda:
        condition: service_started

  tenant-service:
    build:
      context: ./services/tenant-service
    container_name: unichat-tenant-service
    environment:
      PORT: 3004
      DATABASE_URL: postgresql://unichat_admin:unichat_password@postgres:5432/unichat_db
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started

  user-service:
    build:
      context: ./services/user-service
    container_name: unichat-user-service
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://unichat_admin:unichat_password@postgres:5432/unichat_db
      JWT_SECRET: ${JWT_SECRET:-super_secret_unichat_key}
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  presence-service:
    build:
      context: ./services/presence-service
    container_name: unichat-presence-service
    environment:
      PORT: 3005
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_started

  media-service:
    build:
      context: ./services/media-service
    container_name: unichat-media-service
    environment:
      PORT: 3006
    volumes:
      - ./services/media-service/uploads:/app/uploads

  # SuperAdmin / Institution Admin / Teacher web portal. Public on its own
  # port rather than folded into the gateway, since the Flutter web build
  # already owns "/" there — everything it calls is still auth-gated by JWT,
  # same trust model as the API gateway.
  web-admin:
    build:
      context: ./apps/web-admin
    container_name: unichat-web-admin
    ports:
      - "3000:3000"
    environment:
      AUTH_SERVICE_URL: http://auth-service:3001
      NODE_ENV: production
    depends_on:
      - auth-service

  # One-shot: builds the Flutter web app using a containerized Flutter SDK —
  # nothing is installed on the VPS host itself. Not part of the normal
  # `docker compose up`; run it explicitly whenever the mobile app changes:
  #
  #   docker compose -f docker-compose.vps.yml --profile build \
  #     run --rm web-builder
  #
  # Writes straight into ./apps/mobile/build/web, which the gateway already
  # serves — no restart needed afterward.
  web-builder:
    image: ghcr.io/cirruslabs/flutter:stable
    container_name: unichat-web-builder
    working_dir: /app
    volumes:
      - ./apps/mobile:/app
    command: ["sh", "-c", "flutter pub get && flutter build web --release"]
    profiles: ["build"]

volumes:
  postgres_data:
  redis_data:
